root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/swifty_ai ."
bin = "./tmp/swifty_ai"
delay = 1000
exclude_dir = ["tmp", "docs", "uploads", "node_modules"]
exclude_file = []
exclude_regex = ["_test\\.go$"]
exclude_unchanged = true
follow_symlink = false
include_dir = ["internal"]
include_ext = ["go", "json"]
kill_delay = 500
send_interrupt = true
stop_on_error = true

[log]
time = false
main_only = false

[misc]
clean_on_exit = true
