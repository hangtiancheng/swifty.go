root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/swiftyd"
  cmd = "go build -o ./tmp/swiftyd ./cmd/swiftyd && go build -o ./tmp/swifty ./cmd/swifty && go build -o ./tmp/tui ./cmd/tui"
  delay = 200
  exclude_dir = ["tmp", "vendor", ".git", "node_modules", "sessions", "traces"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  include_ext = ["go", "toml", "yaml", "yml", "json"]
  include_dir = []
  kill_delay = "1s"
  log = "build-errors.log"
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
