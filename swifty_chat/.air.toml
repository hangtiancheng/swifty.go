root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main ./cmd"
bin = "./tmp/main"
full_bin = "./tmp/main"
include_ext = ["go", "toml", "json"]
exclude_dir = ["tmp", "vendor", "node_modules"]
exclude_regex = ["_test\\.go"]
delay = 1000

[log]
time = false

[misc]
clean_on_exit = true
