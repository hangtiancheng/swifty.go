<div>
  {{if visible}}
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div
      class="w-175 rounded-2xl border border-green-100 bg-white p-6 shadow-2xl"
    >
      <h2 class="mb-4 text-center text-lg font-semibold text-green-800">
        Video Call
      </h2>
      <div class="mb-4 flex justify-center gap-4">
        <div
          class="relative h-56.25 w-75 overflow-hidden rounded-lg bg-gray-900"
        >
          <video
            id="local-video"
            autoplay
            playsinline
            muted
            class="h-full w-full object-cover"
          ></video>
          <span
            class="absolute bottom-2 left-2 rounded bg-black/40 px-2 py-0.5 text-xs text-white/80"
            >You</span
          >
        </div>
        <div
          class="relative h-56.25 w-75 overflow-hidden rounded-lg bg-gray-900"
        >
          <video
            id="remote-video"
            autoplay
            playsinline
            class="h-full w-full object-cover"
          ></video>
          <span
            class="absolute bottom-2 left-2 rounded bg-black/40 px-2 py-0.5 text-xs text-white/80"
            >Remote</span
          >
        </div>
      </div>

      {{if incomingCall}}
      <p class="mb-3 text-center text-sm text-green-700">Incoming call...</p>
      {{/if}}

      <div class="flex justify-center gap-3">
        {{if !inCall && !incomingCall}}
        <button
          class="btn btn-sm border-none bg-green-600 text-white hover:bg-green-700"
          @click="startCall()"
        >
          Start Call
        </button>
        {{/if}} {{if incomingCall}}
        <button
          class="btn btn-sm border-none bg-green-600 text-white hover:bg-green-700"
          @click="acceptCall()"
        >
          Accept
        </button>
        <button
          class="btn btn-sm border-none bg-red-500 text-white hover:bg-red-600"
          @click="rejectCall()"
        >
          Reject
        </button>
        {{/if}} {{if inCall}}
        <button
          class="btn btn-sm border-none bg-red-500 text-white hover:bg-red-600"
          @click="hangUp()"
        >
          Hang Up
        </button>
        {{/if}}
        <button
          class="btn btn-sm btn-ghost text-gray-500"
          @click="closeModal()"
        >
          Close
        </button>
      </div>
    </div>
  </div>
  {{/if}}
</div>
