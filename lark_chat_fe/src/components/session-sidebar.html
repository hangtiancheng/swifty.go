<div class="flex flex-col h-full w-full">
  <div class="p-2">
    <input
      type="text"
      class="input input-bordered input-sm w-full focus:border-green-400"
      placeholder="Search sessions"
      @input="onSearch()"
    />
  </div>
  <div class="overflow-y-auto flex-1">
    <div class="collapse collapse-arrow bg-green-50/50 rounded-none border-b border-green-100">
      <input type="checkbox" @change="toggleUsers()" />
      <div class="collapse-title text-sm font-medium text-green-800">Users</div>
      <div class="collapse-content p-0">
        {{forOf userSessions as user idx}}
        <div
          class="flex items-center gap-2 px-3 py-2 hover:bg-green-50 cursor-pointer transition-colors"
          @click="chatUser({id: '{{=user.user_id}}'})"
        >
          <div class="avatar">
            <div class="w-8 rounded-full"><img src="{{=user.avatar}}" /></div>
          </div>
          <span class="text-sm truncate text-gray-700">{{=user.user_name}}</span>
        </div>
        {{/forOf}}
      </div>
    </div>
    <div class="collapse collapse-arrow bg-green-50/50 rounded-none border-b border-green-100">
      <input type="checkbox" @change="toggleGroups()" />
      <div class="collapse-title text-sm font-medium text-green-800">Groups</div>
      <div class="collapse-content p-0">
        {{forOf groupSessions as group idx}}
        <div
          class="flex items-center gap-2 px-3 py-2 hover:bg-green-50 cursor-pointer transition-colors"
          @click="chatGroup({id: '{{=group.group_id}}'})"
        >
          <div class="avatar">
            <div class="w-8 rounded-full"><img src="{{=group.avatar}}" /></div>
          </div>
          <span class="text-sm truncate text-gray-700">{{=group.group_name}}</span>
        </div>
        {{/forOf}}
      </div>
    </div>
  </div>
</div>
