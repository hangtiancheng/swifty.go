<div
  class="flex min-h-screen items-center justify-center bg-linear-to-br from-green-50 to-emerald-50 p-4"
>
  <div
    class="w-full max-w-md rounded-2xl border border-green-100 bg-white p-8 shadow-lg"
  >
    <h2 class="mb-8 text-center text-2xl font-semibold text-green-800">
      Register
    </h2>
    <fieldset class="fieldset space-y-4">
      <label class="label text-sm text-green-700">Nickname</label>
      <input
        type="text"
        class="input input-bordered w-full focus:border-green-400"
        placeholder="3-10 characters"
        value="{{=nickname}}"
        @input="onNickInput()"
      />

      <label class="label text-sm text-green-700">Phone</label>
      <input
        type="text"
        class="input input-bordered w-full focus:border-green-400"
        placeholder="Enter your phone number"
        value="{{=telephone}}"
        @input="onTelInput()"
      />

      <label class="label text-sm text-green-700">Password</label>
      <input
        type="password"
        class="input input-bordered w-full focus:border-green-400"
        placeholder="Enter your password"
        value="{{=password}}"
        @input="onPwdInput()"
      />

      <label class="label text-sm text-green-700">Confirm Password</label>
      <input
        type="password"
        class="input input-bordered w-full focus:border-green-400"
        placeholder="Re-enter your password"
        value="{{=confirmPassword}}"
        @input="onConfirmPwdInput()"
      />
    </fieldset>

    <button
      class="btn mt-8 w-full border-none bg-green-600 text-white hover:bg-green-700"
      @click="handleRegister()"
    >
      Register
    </button>

    <div class="mt-5 flex justify-end">
      <a
        class="cursor-pointer text-sm text-green-600 hover:text-green-800 hover:underline"
        @click="goLogin()"
        >Sign In</a
      >
    </div>
  </div>
</div>
