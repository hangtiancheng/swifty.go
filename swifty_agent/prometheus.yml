# Prometheus scrape configuration
# Scrapes Prometheus itself + Redis Stack (via redis_stack_host)
# Note: the redis/redis-stack image does not include a built-in exporter;
# to collect Redis metrics, run a separate redis_exporter container and add it to targets.
# Currently only scrapes Prometheus itself for verification.

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "redis"
    static_configs:
      - targets: ["swifty-redis:6379"]
