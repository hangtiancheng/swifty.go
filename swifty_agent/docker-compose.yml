# Swifty Agent Infrastructure
# Provides Redis Stack (RediSearch vector search) + Prometheus + Grafana
# Aligned with the Next.js project docker-compose.yml for local development and testing
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Purge data (DEC-1=A migration): docker compose down -v && rm -rf volumes/

services:
  redis:
    container_name: swifty-redis
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001" # RedisInsight UI
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: swifty-prometheus
    hostname: prometheus
    ports:
      - "9090:9090"
    privileged: true
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:latest
    container_name: swifty-grafana
    hostname: grafana
    ports:
      - "3000:3000"
    privileged: true
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=root
      - GF_SECURITY_ADMIN_PASSWORD=pass
    depends_on:
      - prometheus

networks:
  default:
    name: swifty-agent
