# air — Development hot-reload configuration (swifty_agent)
# Install: go install github.com/air-verse/air@latest
# Start:   run air in the swifty_agent/ directory
#
# Watches .go file changes, automatically runs go build and restarts the server.
# The frontend directory (fe/), documentation (docs/), and build artifacts (tmp/)
# are excluded to avoid unnecessary triggers. Changes to config.json do not trigger
# a restart (already loaded at runtime); restart manually after config changes.

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
# Build command: outputs tmp/main
cmd = "go build -o ./tmp/main ."
# Binary to run
bin = "./tmp/main"
# Watched file extensions
include_ext = ["go", "tpl", "tmpl", "html"]
# Excluded file extensions
exclude_ext = []
# Excluded directories: frontend, docs, build artifacts, dependencies
exclude_dir = ["tmp", "fe", "docs", "node_modules", ".swifty", ".omo"]
# Included directories (empty = all, subject to exclude_dir constraints)
include_dir = []
# Exclude regex
exclude_regex = ["_test\\.go"]
# Trigger delay (ms) to avoid multiple triggers on save
delay = 1000
# Stop the old process on build failure
stop_on_error = true
# Send interrupt signal
send_interrupt_signal = true
# Kill delay (ms)
kill_delay = 500

[log]
# Show timestamps in logs
time = true

[misc]
# Clean up tmp on exit
clean_on_exit = true
